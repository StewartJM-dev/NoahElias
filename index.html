<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Noah Elias — A Saga of Water and Fire</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Cinzel+Decorative:wght@400;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
–gold: #C9943C;
–gold-light: #E8B860;
–gold-dim: #9B7020;
–deep: #060404;
–dark: #0D0906;
}

html, body {
width: 100%; height: 100%;
overflow: hidden;
background: var(–deep);
color: var(–gold-light);
font-family: ‘EB Garamond’, Georgia, serif;
}

/* ── BACKGROUND ── */
.bg {
position: fixed; inset: 0; z-index: 0;
background:
radial-gradient(ellipse 80% 50% at 50% 100%, rgba(13,34,51,0.5) 0%, transparent 60%),
radial-gradient(ellipse 60% 40% at 50% 0%,   rgba(80,25,0,0.25) 0%, transparent 55%),
radial-gradient(ellipse 100% 100% at 50% 50%, #0D0906 0%, #060404 100%);
}

/* fire glow from mark area */
.fire-ambient {
position: fixed;
top: 0; left: 50%;
transform: translateX(-50%);
width: 600px; height: 600px;
z-index: 1;
background: radial-gradient(ellipse 50% 60% at 50% 35%,
rgba(200,80,10,0.08) 0%,
rgba(150,50,5,0.04) 40%,
transparent 70%);
animation: ambientpulse 8s ease-in-out infinite;
pointer-events: none;
}
@keyframes ambientpulse {
0%,100% { opacity: 0.6; transform: translateX(-50%) scale(1); }
50%      { opacity: 1;   transform: translateX(-50%) scale(1.05); }
}

/* grain */
.grain {
position: fixed; inset: 0; z-index: 2;
opacity: 0.035;
background-image: url(“data:image/svg+xml,%3Csvg viewBox=‘0 0 200 200’ xmlns=‘http://www.w3.org/2000/svg’%3E%3Cfilter id=‘n’%3E%3CfeTurbulence type=‘fractalNoise’ baseFrequency=‘0.85’ numOctaves=‘4’ stitchTiles=‘stitch’/%3E%3C/filter%3E%3Crect width=‘100%25’ height=‘100%25’ filter=‘url(%23n)’/%3E%3C/svg%3E”);
pointer-events: none;
}

/* ── STAGE ── */
.stage {
position: fixed; inset: 0; z-index: 10;
display: flex; flex-direction: column;
align-items: center; justify-content: center;
padding: 2rem;
gap: 0;
}

/* ── MARK IMAGE ── */
.mark {
animation: markfade 2.5s ease-out forwards;
opacity: 0;
margin-bottom: clamp(1rem, 3vw, 2rem);
position: relative;
}
@keyframes markfade {
from { opacity: 0; transform: scale(0.9); }
to   { opacity: 1; transform: scale(1); }
}

.mark img {
width: min(300px, 72vw);
height: auto;
display: block;
filter:
drop-shadow(0 0 35px rgba(210,90,5,0.7))
drop-shadow(0 0 80px rgba(210,90,5,0.3))
drop-shadow(0 0 10px rgba(13,80,140,0.5));
}

/* ── TITLE BLOCK ── */
.title-block {
text-align: center;
margin-bottom: clamp(1.5rem, 3.5vw, 2.5rem);
animation: rise 2.5s ease-out 0.5s forwards;
opacity: 0;
}
@keyframes rise {
from { opacity: 0; transform: translateY(10px); }
to   { opacity: 1; transform: translateY(0); }
}

.eyebrow {
font-family: ‘Cinzel’, serif;
font-size: clamp(0.5rem, 1.3vw, 0.65rem);
letter-spacing: 0.5em;
color: var(–gold-dim);
text-transform: uppercase;
margin-bottom: 0.85rem;
}

.saga-title {
font-family: ‘Cinzel Decorative’, serif;
font-size: clamp(1.4rem, 5vw, 2.8rem);
font-weight: 700;
color: #E8B860;
letter-spacing: 0.07em;
line-height: 1.15;
text-shadow:
0 0 30px rgba(232,184,96,0.7),
0 0 60px rgba(201,148,60,0.35),
0 0 100px rgba(201,148,60,0.15);
margin-bottom: 0.45rem;
}

.series-line {
font-family: ‘Cinzel’, serif;
font-size: clamp(0.6rem, 1.6vw, 0.8rem);
letter-spacing: 0.4em;
color: #C9943C;
text-transform: uppercase;
}

/* ── RULE ── */
.rule {
width: min(220px, 55vw);
height: 1px;
background: linear-gradient(90deg, transparent, rgba(201,168,76,0.5), transparent);
margin-bottom: clamp(1.2rem, 3vw, 2rem);
animation: rulefade 2.5s ease-out 1s forwards;
opacity: 0;
}
@keyframes rulefade {
from { opacity: 0; }
to   { opacity: 1; }
}

/* ── ROTATING TAGLINE ── */
.tagline-wrap {
height: clamp(2.8rem, 6vw, 4rem);
display: flex; align-items: center; justify-content: center;
max-width: min(640px, 90vw);
width: 100%;
margin-bottom: clamp(1.5rem, 3.5vw, 2.5rem);
position: relative;
opacity: 1;
visibility: visible;
}

.tagline {
font-family: ‘EB Garamond’, Georgia, ‘Times New Roman’, serif;
font-style: italic;
font-size: clamp(1rem, 2.8vw, 1.35rem);
color: #D4A843;
text-align: center;
letter-spacing: 0.02em;
line-height: 1.4;
position: absolute;
width: min(640px, 90vw);
opacity: 1;
transform: translateY(0);
transition: opacity 0.9s ease, transform 0.9s ease;
}
.tagline.leaving  { opacity: 0; transform: translateY(-12px); }
.tagline.entering { opacity: 0; transform: translateY(12px); }
.tagline.visible  { opacity: 1; transform: translateY(0); }

/* ── BOTTOM RULE ── */
.rule2 {
width: min(160px, 40vw);
height: 1px;
background: linear-gradient(90deg, transparent, rgba(201,168,76,0.3), transparent);
margin-bottom: clamp(1rem, 2.5vw, 1.5rem);
animation: rulefade 2.5s ease-out 1.8s forwards;
opacity: 0;
}

/* ── COMING SOON ── */
.coming {
text-align: center;
animation: rise 2.5s ease-out 2s forwards;
opacity: 0;
}

.coming-label {
font-family: ‘Cinzel’, serif;
font-size: clamp(0.45rem, 1.2vw, 0.6rem);
letter-spacing: 0.6em;
color: rgba(201,168,76,0.8);
text-transform: uppercase;
margin-bottom: 0.4rem;
}

.author-name {
font-family: ‘EB Garamond’, Georgia, serif;
font-size: clamp(0.8rem, 2vw, 1rem);
color: rgba(201,168,76,0.65);
letter-spacing: 0.1em;
}

/* ── FOLLOW PROMPT ── */
.follow-prompt {
position: fixed;
bottom: clamp(1.2rem, 4vw, 2.2rem);
left: 50%;
transform: translateX(-50%);
z-index: 20;
font-family: ‘Cinzel’, serif;
font-size: clamp(0.45rem, 1.2vw, 0.58rem);
letter-spacing: 0.45em;
color: rgba(201,168,76,0.55);
text-transform: uppercase;
white-space: nowrap;
opacity: 0;
transition: opacity 1.8s ease;
pointer-events: none;
}
.follow-prompt.show { opacity: 1; }
.follow-prompt.hide { opacity: 0; }

/* ── EMBER SPARKS ── */
.particles {
position: fixed; inset: 0; z-index: 4;
pointer-events: none; overflow: hidden;
}
.ember {
position: absolute;
border-radius: 50%;
animation: ember-rise linear infinite;
opacity: 0;
}
@keyframes ember-rise {
0%   {
transform: translateY(100vh) translateX(0) scale(1);
opacity: 0;
}
5%   { opacity: var(–peak); }
40%  {
transform: translateY(60vh) translateX(calc(var(–drift) * 0.4)) scale(0.9);
opacity: var(–peak);
}
75%  {
transform: translateY(25vh) translateX(var(–drift)) scale(0.5);
opacity: calc(var(–peak) * 0.5);
}
100% {
transform: translateY(-10vh) translateX(calc(var(–drift) * 1.2)) scale(0.1);
opacity: 0;
}
}

/* subtle horizontal scan line */
.scanline {
position: fixed; left: 0; right: 0;
height: 1px; z-index: 5;
background: linear-gradient(90deg,
transparent 0%,
rgba(201,168,76,0.05) 20%,
rgba(201,168,76,0.12) 50%,
rgba(201,168,76,0.05) 80%,
transparent 100%);
animation: scan 18s linear infinite;
pointer-events: none;
}
@keyframes scan {
from { top: -2px; }
to   { top: 100vh; }
}
</style>

</head>
<body>

<div class="bg"></div>
<div class="fire-ambient"></div>
<div class="grain"></div>
<div class="scanline"></div>
<div class="particles" id="particles"></div>

<div class="stage">

  <!-- THE MARK -->

  <div class="mark">
    <img src="ne_mark.png" alt="Noah Elias — Water and Fire">
  </div>

  <!-- TITLE -->

  <div class="title-block">
    <h1 class="saga-title">A Saga of<br>Water and Fire</h1>
    <p class="series-line">Noah Elias</p>
  </div>

  <!-- DIVIDER -->

  <div class="rule"></div>

  <!-- ROTATING TAGLINE -->

  <div class="tagline-wrap">
    <p class="tagline visible" id="tagline">This is not the fairy tale you were told.</p>
  </div>

  <!-- SECOND RULE -->

  <div class="rule2"></div>

  <!-- COMING SOON -->

  <div class="coming">
    <p class="coming-label">Coming Soon</p>
    <p class="author-name">noahelias.org</p>
  </div>

</div>

<!-- SUBTLE FOLLOW PROMPT — appears after 4th rotation, fades in and out once -->

<div class="follow-prompt" id="followPrompt">Follow @noaheliasbooks</div>

<script>
// ── TAGLINES ──
const taglines = [
  "This is not the fairy tale you were told.",
  "What has your imagination become?",
  "The last thing they expected was an ending.",
  "You have been Connected your entire life.",
  "You chose freely. Or so you were told.",
  "They had everything they ever wanted. Almost.",
  "What if the hour is closer than you think?",
  "The covenant was tailored to the desire of your heart.",
  "One door. Everything changes.",
  "Some things do not change. Everything else does.",
  "History does not repeat. It continues.",
];

var current = 0;
var rotationCount = 0;
var el = document.getElementById('tagline');
var followPrompt = document.getElementById('followPrompt');

// Make sure first tagline is set
el.textContent = taglines[0];
el.className = 'tagline visible';

function rotate() {
  // Start leaving
  el.className = 'tagline leaving';

  setTimeout(function() {
    current = (current + 1) % taglines.length;
    rotationCount++;
    el.textContent = taglines[current];
    el.className = 'tagline entering';

    setTimeout(function() {
      el.className = 'tagline visible';
    }, 50);

    // Show follow prompt after 4th rotation once only
    if (rotationCount === 4) {
      setTimeout(function() {
        followPrompt.classList.add('show');
        setTimeout(function() {
          followPrompt.classList.remove('show');
        }, 4000);
      }, 2000);
    }
  }, 900);
}

setInterval(rotate, 5500);

// ── EMBER SPARKS ──
var container = document.getElementById('particles');
var emberColors = [
  {r:255,g:140,b:20},
  {r:255,g:90, b:10},
  {r:255,g:200,b:50},
  {r:210,g:148,b:60},
  {r:30, g:100,b:200},
];
for (var i = 0; i < 45; i++) {
  var em = document.createElement('div');
  em.className = 'ember';
  var x     = 15 + Math.random() * 70;
  var dur   = 6 + Math.random() * 12;
  var delay = Math.random() * 18;
  var drift = (Math.random() - 0.5) * 140;
  var size  = 1.5 + Math.random() * 3.5;
  var peak  = 0.5 + Math.random() * 0.5;
  var c     = emberColors[Math.floor(Math.random() * emberColors.length)];
  var col   = 'rgba('+c.r+','+c.g+','+c.b+','+peak.toFixed(2)+')';
  var glow  = 'rgba('+c.r+','+c.g+','+c.b+',0.4)';
  em.style.cssText = 'left:'+x+'%;width:'+size+'px;height:'+size+'px;background:'+col+';box-shadow:0 0 '+(size*2)+'px '+size+'px '+glow+';animation-duration:'+dur+'s;animation-delay:-'+delay+'s;--drift:'+drift+'px;--peak:'+peak+';';
  container.appendChild(em);
}
</script>

</body>
</html>
