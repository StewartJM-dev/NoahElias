<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --gold:       #D4AF37;
  --gold-light: #E8C96A;
  --deep:       #060404;
  --dark:       #0D0906;
}

html, body {
  width: 100%; height: 100%; overflow: hidden;
  background: var(--deep);
  font-family: 'EB Garamond', Georgia, serif;
}

/* ── BACKGROUND ── */
.bg {
  position: fixed; inset: 0; z-index: 0;
  background:
    radial-gradient(ellipse 80% 50% at 50% 100%, rgba(13,34,51,0.5) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 50% 0%,   rgba(80,25,0,0.25) 0%, transparent 55%),
    radial-gradient(ellipse 100% 100% at 50% 50%, #0D0906 0%, #060404 100%);
}
.fire-ambient {
  position: fixed; inset: 0; z-index: 1; pointer-events: none;
  background: radial-gradient(ellipse 40% 30% at 50% 22%, rgba(180,70,5,0.08) 0%, transparent 100%);
  animation: ambientpulse 8s ease-in-out infinite;
}
@keyframes ambientpulse { 0%,100%{opacity:0.6} 50%{opacity:1} }
.grain {
  position: fixed; inset: 0; z-index: 2; opacity: 0.035; pointer-events: none;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
}
.scanlines {
  position: fixed; inset: 0; z-index: 3; pointer-events: none;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
}
/* Embers + rings share this container */
.particles { position: fixed; inset: 0; z-index: 4; pointer-events: none; overflow: hidden; }

/* ── STAGE ── */
.stage {
  position: fixed; inset: 0; z-index: 10;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 1.2rem; gap: 0;
}

/* ════════════════════════════════════════
   SCENE  —  fire + drop + pool container
   ════════════════════════════════════════ */
.scene-wrap {
  position: relative;
  width: min(260px, 64vw);
  height: min(310px, 76vw);
  flex-shrink: 0;
  margin-bottom: clamp(0.4rem, 1.2vw, 0.9rem);
  animation: scenefade 2s ease-out 0.3s forwards;
  opacity: 0;
}
@keyframes scenefade { from{opacity:0} to{opacity:1} }

/* ── FIRE ─────────────────────────────── */
/* Anchor: horizontal center, 36% down scene */
.fire-anchor {
  position: absolute;
  left: 50%; top: 36%;
  width: 0; height: 0;
  z-index: 2;
}

/* Orange oval glow at fire base */
.fire-base-glow {
  position: absolute;
  left: 50%; bottom: 0;
  transform: translateX(-50%);
  width: min(90px, 24vw);
  height: min(40px, 11vw);
  border-radius: 50%;
  background: radial-gradient(ellipse, rgba(255,110,15,0.55), rgba(180,55,5,0.28) 55%, transparent 80%);
  filter: blur(7px);
  animation: baseglow 2.0s ease-in-out infinite;
}
@keyframes baseglow {
  0%,100% { opacity:0.70; transform:translateX(-50%) scale(1.00); }
  45%     { opacity:1.00; transform:translateX(-50%) scale(1.18); }
}

/* All flames anchored bottom-center of fire-anchor */
.oflame {
  position: absolute;
  bottom: 0; left: 50%;
  border-radius: 50% 50% 35% 35%;
  transform-origin: center bottom;
}

/* Layer 1 — broad outer orange, drifts */
.ofl-1 {
  width: min(72px, 20vw); height: min(105px, 29vw);
  background: linear-gradient(to top, #cc2000, #ff5500, #ff8800, rgba(255,130,0,0.25), transparent);
  filter: blur(12px); opacity: 0.62;
  animation: ofl1 2.2s ease-in-out infinite alternate;
}
@keyframes ofl1 {
  0%   { transform:translateX(-52%) scaleX(1.00) rotate(-5deg); opacity:0.52; }
  28%  { transform:translateX(-42%) scaleX(1.18) rotate(6deg);  opacity:0.72; }
  55%  { transform:translateX(-56%) scaleX(0.86) rotate(-3deg); opacity:0.56; }
  80%  { transform:translateX(-44%) scaleX(1.12) rotate(7deg);  opacity:0.74; }
  100% { transform:translateX(-52%) scaleX(1.00) rotate(-5deg); opacity:0.54; }
}

/* Layer 2 — wild turbulent flare */
.ofl-2 {
  width: min(46px, 13vw); height: min(128px, 35vw);
  background: linear-gradient(to top, transparent, rgba(255,185,45,0.48), rgba(255,220,90,0.22), transparent);
  filter: blur(9px); opacity: 0.48;
  animation: ofl2 3.6s ease-in-out infinite;
}
@keyframes ofl2 {
  0%   { transform:translateX(-64%) scaleX(0.72) rotate(-11deg); opacity:0.14; }
  14%  { transform:translateX(-37%) scaleX(1.45) rotate(13deg);  opacity:0.67; }
  32%  { transform:translateX(-58%) scaleX(0.78) rotate(-7deg);  opacity:0.26; }
  50%  { transform:translateX(-40%) scaleX(1.32) rotate(10deg);  opacity:0.58; }
  70%  { transform:translateX(-62%) scaleX(0.74) rotate(-12deg); opacity:0.17; }
  86%  { transform:translateX(-38%) scaleX(1.22) rotate(9deg);   opacity:0.52; }
  100% { transform:translateX(-64%) scaleX(0.72) rotate(-11deg); opacity:0.14; }
}

/* Layer 3 — mid yellow, medium speed */
.ofl-3 {
  width: min(48px, 13vw); height: min(88px, 24vw);
  background: linear-gradient(to top, #ff6500, #ffaa00, #ffdd44, transparent);
  filter: blur(5px); opacity: 0.90;
  animation: ofl3 1.25s ease-in-out infinite alternate;
}
@keyframes ofl3 {
  0%   { transform:translateX(-54%) scaleX(1.00) rotate(3deg);  }
  32%  { transform:translateX(-46%) scaleX(1.12) rotate(-5deg); }
  65%  { transform:translateX(-57%) scaleX(0.88) rotate(3deg);  }
  100% { transform:translateX(-50%) scaleX(1.06) rotate(-3deg); }
}

/* Layer 4 — inner bright, fast */
.ofl-4 {
  width: min(28px, 8vw); height: min(68px, 19vw);
  background: linear-gradient(to top, #ffcc00, #ffee55, #ffff99, transparent);
  filter: blur(3px); opacity: 0.95;
  animation: ofl4 0.82s ease-in-out infinite alternate;
}
@keyframes ofl4 {
  0%   { transform:translateX(-48%) scaleX(1.00) rotate(-6deg); }
  30%  { transform:translateX(-56%) scaleX(1.16) rotate(8deg);  }
  65%  { transform:translateX(-43%) scaleX(0.84) rotate(-5deg); }
  100% { transform:translateX(-50%) scaleX(1.08) rotate(5deg);  }
}

/* Layer 5 — white core, fastest */
.ofl-5 {
  width: min(16px, 4.5vw); height: min(50px, 14vw);
  background: linear-gradient(to top, #ffffff, #ffffee, #ffff88, transparent);
  filter: blur(1.5px); opacity: 0.97;
  animation: ofl5 0.52s ease-in-out infinite alternate;
}
@keyframes ofl5 {
  0%   { transform:translateX(-50%) scaleX(1.00) scaleY(1.00); opacity:0.88; }
  40%  { transform:translateX(-44%) scaleX(1.22) scaleY(0.84); opacity:1.00; }
  100% { transform:translateX(-53%) scaleX(0.82) scaleY(1.22); opacity:0.90; }
}

/* ── DROP ─────────────────────────────── */
/*
  Positioned at fire level (36%).
  Animation offsets it vertically through the scene.
  Center of drop image sits on the anchor point.
*/
.drop-wrap {
  position: absolute;
  left: 50%; top: 36%;
  z-index: 5;
  transform-origin: center center;
  animation: dropfall 9s ease-in 0.8s infinite;
}

/* Drop image — centered on the drop-wrap anchor point */
.drop-img {
  display: block;
  width: min(130px, 37vw);
  /* Center image on anchor: shift left by half width, up by half height */
  position: relative;
  left: 0;
  transform: translateX(-50%) translateY(-50%);
  transform-origin: center bottom;
  animation: dropglow 2.3s ease-in-out 0.8s infinite;
}
@keyframes dropglow {
  0%,100% {
    filter:
      drop-shadow(0 0 20px rgba(210,90,5,0.55))
      drop-shadow(0 0 7px  rgba(13,80,160,0.45));
  }
  38% {
    filter:
      drop-shadow(0 0 38px rgba(240,115,5,0.90))
      drop-shadow(0 0 16px rgba(20,105,215,0.72));
  }
}

/*
  DROP FALL ANIMATION
  translateY(0) = fire level (pause position)
  Negative = above fire
  Positive = below fire, toward pool

  Pool is at 82% of scene (460px * 0.82 = ~253px from top)
  Fire is at 36% (460px * 0.36 = ~166px from top)
  Δ = 87px travel to pool from fire

  Drop starts: 36% - 200px above = ~above the scene
  Pool distance from fire anchor: ~110px (pool 82% - fire 36% = 46% of min(310px,76vw))
  At 310px scene: 46% * 310 = 143px
  At 76vw on 375px phone: 76vw = 285px, 46% = 131px
  Use 135px as pool travel distance
*/
@keyframes dropfall {

  /* ① Above scene, invisible */
  0%   { transform: translateX(-50%) translateY(-200px) scaleX(0.86) scaleY(1.22); opacity:0; }

  /* ② Fades in, falling (elongated) */
  4%   { opacity:1; }
  22%  { transform: translateX(-50%) translateY(-70px) scaleX(0.90) scaleY(1.14); opacity:1; }

  /* ③ Decelerating into fire zone */
  33%  { transform: translateX(-50%) translateY(-10px) scaleX(0.96) scaleY(1.05); }

  /* ④ PAUSE AT FIRE — drop settles to normal shape */
  39%  { transform: translateX(-50%) translateY(0px)  scaleX(1.00) scaleY(1.00); }

  /* ④a Surface-tension wobble while paused */
  43%  { transform: translateX(-50%) translateY(3px)  scaleX(1.03) scaleY(0.97); }
  47%  { transform: translateX(-50%) translateY(-2px) scaleX(0.97) scaleY(1.03); }
  51%  { transform: translateX(-50%) translateY(2px)  scaleX(1.02) scaleY(0.98); }
  55%  { transform: translateX(-50%) translateY(0px)  scaleX(1.00) scaleY(1.00); }
  60%  { transform: translateX(-50%) translateY(0px)  scaleX(1.00) scaleY(1.00); }

  /* ⑤ RELEASE — elongates as it accelerates */
  63%  { transform: translateX(-50%) translateY(6px)  scaleX(0.95) scaleY(1.08); }
  68%  { transform: translateX(-50%) translateY(38px) scaleX(0.90) scaleY(1.20); }
  74%  { transform: translateX(-50%) translateY(88px) scaleX(0.87) scaleY(1.26); }

  /* ⑥ IMPACT SQUISH */
  80%  { transform: translateX(-50%) translateY(133px) scaleX(1.55) scaleY(0.14); opacity:1; }
  83%  { transform: translateX(-50%) translateY(136px) scaleX(1.90) scaleY(0.03); opacity:0; }

  /* ⑦ Instantly reset above (invisible) */
  84%  { transform: translateX(-50%) translateY(-200px) scaleX(0.86) scaleY(1.22); opacity:0; }
  100% { transform: translateX(-50%) translateY(-200px) scaleX(0.86) scaleY(1.22); opacity:0; }
}

/* ── FIRE FRONT GLOW ──────────────────
   Higher z-index than drop.
   Only visible during the pause phase.
   Creates depth — fire bleeds slightly in front of drop. */
.fire-front {
  position: absolute;
  left: 50%; top: 36%;
  transform: translate(-50%, -50%);
  width: min(180px, 50vw);
  height: min(140px, 39vw);
  border-radius: 50%;
  background: radial-gradient(ellipse,
    rgba(255,95,10,0.20) 0%,
    rgba(200,55,5,0.08) 55%,
    transparent 75%);
  z-index: 6; pointer-events: none;
  opacity: 0;
  animation: frontglow 9s ease-in-out 0.8s infinite;
}
@keyframes frontglow {
  0%,  36% { opacity:0; }
  44%      { opacity:0.75; }
  55%      { opacity:0.95; }
  62%      { opacity:0.55; }
  69%      { opacity:0; }
  100%     { opacity:0; }
}

/* ── POOL ─────────────────────────────── */
.pool-wrap {
  position: absolute;
  left: 50%; top: 82%;
  transform: translateX(-50%);
  width: min(190px, 52vw);
  z-index: 3;
}

.pool-surface {
  width: 100%;
  height: min(9px, 2.5vw);
  background: linear-gradient(90deg,
    transparent 0%,
    rgba(45,125,200,0.22) 18%,
    rgba(75,165,240,0.48) 50%,
    rgba(45,125,200,0.22) 82%,
    transparent 100%);
  border-radius: 50%;
  position: relative;
  transition: box-shadow 0.1s;
}

/* Fire reflection on pool */
.pool-surface::after {
  content: "";
  position: absolute;
  left: 50%; top: 50%;
  transform: translate(-50%, -50%);
  width: 55%; height: 200%;
  background: radial-gradient(ellipse, rgba(255,100,20,0.18), transparent 70%);
  filter: blur(3px);
  border-radius: 50%;
  animation: poolreflect 2.0s ease-in-out 0.8s infinite;
}
@keyframes poolreflect { 0%,100%{opacity:0.55} 45%{opacity:1.00} }

.pool-surface.splash {
  box-shadow: 0 0 14px 3px rgba(75,165,240,0.65);
}

/* ── RIPPLE RINGS (JS-injected, absolute to .particles) ── */
.ripple {
  position: absolute;
  border-radius: 50%;
  border: 1.5px solid rgba(75,155,225,0.55);
  pointer-events: none;
  animation: rippleout linear forwards;
}
.ripple.warm { border-color: rgba(255,138,38,0.30); }
@keyframes rippleout {
  0%   { transform:translate(-50%,-50%) scale(0.12); opacity:0.72; }
  100% { transform:translate(-50%,-50%) scale(5.00); opacity:0; }
}

   TEXT

.tagline-wrap {

.tagline.leaving  { opacity:0; transform:translateY(-12px); }

/* ── EMBER SPARKS ── */
.ember { position: absolute; border-radius: 50%; animation: ember-rise linear infinite; }
@keyframes ember-rise {
  0%   { transform:translateY(100vh) translateX(0)    scale(1);   opacity:0; }

  50%  { transform:translateY(50vh)  translateX(28px)  scale(0.7); opacity:0.7; }

<script>
// ── TAGLINES ──
const taglines = [
  "This is not the fairy tale you were told.",
  "What has your imagination become?",
  "The last thing they expected was an ending.",
  "You have been Connected your entire life.",
  "You chose freely. Or so you were told.",
  "They had everything they ever wanted. Almost.",
  "What if the hour is closer than you think?",
  "The covenant was tailored to the desire of your heart.",
  "One door. Everything changes.",
  "Some things do not change. Everything else does.",
  "History does not repeat. It continues.",
  "The deep was always there. No one thought to ask what it was waiting for.",
];
let tagIdx = 0;
const tagEl = document.getElementById('tagline');
tagEl.className = 'tagline visible';
function rotateTags() {
  tagEl.className = 'tagline leaving';
  setTimeout(() => {
    tagIdx = (tagIdx + 1) % taglines.length;
    tagEl.textContent = taglines[tagIdx];
    tagEl.className = 'tagline entering';
    setTimeout(() => { tagEl.className = 'tagline visible'; }, 50);
  }, 900);
}
setInterval(rotateTags, 5500);

// ── EMBER SPARKS ──
const pContainer = document.getElementById('particles');
const eColors = ['rgba(255,140,20,','rgba(255,90,10,','rgba(255,200,50,','rgba(210,148,60,','rgba(30,100,200,'];
for (let i = 0; i < 38; i++) {
  const em   = document.createElement('div');
  em.className = i % 3 === 0 ? 'ember left' : 'ember';
  const x    = 10 + Math.random() * 80;
  const dur  = 5  + Math.random() * 10;
  const del  = Math.random() * 15;
  const sz   = 2  + Math.random() * 3.5;
  const op   = (0.5 + Math.random() * 0.5).toFixed(2);
  const col  = eColors[Math.floor(Math.random() * eColors.length)];
  em.style.left              = x + '%';
  em.style.width             = sz + 'px';
  em.style.height            = sz + 'px';
  em.style.background        = col + op + ')';
  em.style.boxShadow         = '0 0 '+(sz*2.5)+'px '+sz+'px '+col+'0.32)';
  em.style.animationDuration = dur + 's';
  em.style.animationDelay    = '-' + del + 's';
  pContainer.appendChild(em);
}

// ── IMPACT — RINGS ──
// Cycle matches CSS: 9s, animation-delay: 0.8s
// Impact at 80% * 9000 = 7200ms into each cycle
const CYCLE    = 9000;
const IMPACT   = 7200;
const CSS_DELAY = 800;

const poolSurface = document.getElementById('pool-surface');

function getPoolCenter() {
  const scene = document.getElementById('scene-wrap');
  const r     = scene.getBoundingClientRect();
  return {
    x: r.left + r.width  * 0.50,
    y: r.top  + r.height * 0.82,
    w: r.width
  };
}

function spawnRing(pos, delay, warm) {
  setTimeout(() => {
    const r   = document.createElement('div');
    r.className = warm ? 'ripple warm' : 'ripple';
    const w   = pos.w * (0.50 + Math.random() * 0.12);
    const h   = w * 0.32;
    const dur = 1.7 + Math.random() * 0.6;
    r.style.cssText =
      'left:'+pos.x+'px;top:'+pos.y+'px;'+
      'width:'+w+'px;height:'+h+'px;'+
      'animation-duration:'+dur+'s;';
    pContainer.appendChild(r);
    setTimeout(() => r.remove(), dur * 1000 + 100);
  }, delay);
}

function fireImpact() {
  const pos = getPoolCenter();

  // Pool flash
  poolSurface.classList.add('splash');
  setTimeout(() => poolSurface.classList.remove('splash'), 320);

  // 3 water rings + 1 warm (fire-reflection) ring
  spawnRing(pos,   0,   false);
  spawnRing(pos, 135,   false);
  spawnRing(pos, 270,   false);
  spawnRing(pos, 180,   true);
}

// Sync with CSS animation
setTimeout(() => {
  fireImpact();
  setInterval(fireImpact, CYCLE);
}, CSS_DELAY + IMPACT);
</script>
