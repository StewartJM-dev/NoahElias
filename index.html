<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Noah Elias — A Saga of Water and Fire</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Cinzel+Decorative:wght@400;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet">

<style>
*, *::before, ::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --gold: #D4AF37;
  --gold-light: #E8C96A;
  --gold-dim: #9B7A20;
  --deep: #060404;
  --dark: #0D0906;
}

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: var(--deep);
  color: var(--gold-light);
  font-family: 'EB Garamond', Georgia, serif;
}

/ BACKGROUND /
.bg {
  position: fixed; inset: 0; z-index: 0;
  background:
  radial-gradient(ellipse 80% 50% at 50% 100%, rgba(13,34,51,0.5) 0%, transparent 60%),
  radial-gradient(ellipse 60% 40% at 50% 0%, rgba(80,25,0,0.25) 0%, transparent 55%),
  radial-gradient(ellipse 100% 100% at 50% 50%, #0D0906 0%, #060404 100%);
}

.fire-ambient {
  position: fixed; inset: 0; z-index: 1;
  background: radial-gradient(ellipse 40% 35% at 50% 28%, rgba(180,70,5,0.07), transparent);
  animation: ambientpulse 8s ease-in-out infinite;
}
@keyframes ambientpulse {
  0%,100% { opacity: 0.6; }
  50% { opacity: 1; }
}

.grain {
  position: fixed; inset: 0; z-index: 2;
  opacity: 0.035;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
}

/ STAGE /
.stage {
  position: fixed; inset: 0; z-index: 10;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 1.5rem;
  margin-top: -4vh;
}

/ MARK /
.mark {
  opacity: 0;
  animation: markfade 2.5s ease-out forwards;
}

@keyframes markfade {
  from { opacity: 0; transform: scale(0.9); }
  to   { opacity: 1; transform: scale(1); }
}

.mark-shell {
  position: relative;
  width: min(260px, 62vw);
  animation: float 6s ease-in-out infinite;
}

.mark-base {
  width: 100%;
  display: block;
  z-index: 3;
  position: relative;
  animation: flamecore 2.8s ease-in-out infinite;
}

@keyframes float {
  0%,100% { transform: translateY(0px); }
  50% { transform: translateY(-4px); }
}

@keyframes flamecore {
  0%,100% { filter: brightness(1) saturate(1); }
  50% { filter: brightness(1.06) saturate(1.08); }
}

/ GLOW /
.mark-glow {
  position: absolute;
  inset: 10%;
  background: radial-gradient(circle, rgba(255,140,20,0.25), transparent 70%);
  filter: blur(20px);
  animation: glow 5s ease-in-out infinite;
}

@keyframes glow {
  0%,100% { opacity: 0.5; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.05); }
}

/ SHIMMER /
.mark-shimmer::before {
  content: "";
  position: absolute;
  width: 30%;
  height: 100%;
  left: -40%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
  transform: skewX(-20deg);
  animation: shimmer 8s infinite;
}

@keyframes shimmer {
  0%,70%,100% { left: -40%; opacity: 0; }
  20% { opacity: 0.6; }
  30% { left: 110%; opacity: 0; }
}

/ HEAT /
.mark-heat {
  position: absolute;
  top: -10%;
  left: 50%;
  width: 20%;
  height: 20%;
  transform: translateX(-50%);
  background: radial-gradient(circle, rgba(255,150,50,0.3), transparent);
  filter: blur(10px);
  animation: heat 2s infinite;
}

@keyframes heat {
  0%,100% { transform: translateX(-50%) scaleY(1); }
  50% { transform: translateX(-50%) scaleY(1.2); }
}

/ TEXT */
.saga-title {
  font-family: 'Cinzel', serif;
  font-size: clamp(1.5rem, 5vw, 3rem);
  text-align: center;
  margin-top: 1rem;
}

</style>
</head>

<body>

<div class="bg"></div>
<div class="fire-ambient"></div>
<div class="grain"></div>

<div class="stage">

  <div class="mark">
    <div class="mark-shell">
      <img class="mark-base" src="ne_mark.png">
      <div class="mark-glow"></div>
      <div class="mark-shimmer"></div>
      <div class="mark-heat"></div>
    </div>
  </div>

  <h1 class="saga-title">A Saga of<br>Water and Fire</h1>

</div>

</body>
</html>
